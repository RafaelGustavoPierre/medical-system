spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/medicalSystem?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration

# OCULTA OS LOGGS INICIAS DE CONEXAO DO MYSQL
logging:
  level:
    org.hibernate: WARN
    org.springframework.orm.jpa: WARN
    com.zaxxer.hikari: WARN